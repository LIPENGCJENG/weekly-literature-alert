name: Weekly Literature Alert

on:
  workflow_dispatch:
  schedule:
    # GitHub cron uses UTC. Run at 07:00 and 08:00 UTC, then keep only 09:00 Europe/Rome.
    - cron: "0 7,8 * * 1"

permissions:
  contents: write

jobs:
  weekly-literature-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Europe/Rome schedule
        id: rome_time
        if: github.event_name == 'schedule'
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from datetime import datetime
          from zoneinfo import ZoneInfo
          now = datetime.now(ZoneInfo("Europe/Rome"))
          print(f"should_run={'true' if now.hour == 9 and now.weekday() == 0 else 'false'}")
          print(f"rome_time={now.isoformat()}")
          PY

      - name: Stop duplicate scheduled run
        if: github.event_name == 'schedule' && steps.rome_time.outputs.should_run != 'true'
        run: echo "Not 09:00 Europe/Rome; skipping."

      - name: Set up Python
        if: github.event_name == 'workflow_dispatch' || steps.rome_time.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: github.event_name == 'workflow_dispatch' || steps.rome_time.outputs.should_run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        if: github.event_name == 'workflow_dispatch' || steps.rome_time.outputs.should_run == 'true'
        run: pytest -q

      - name: Generate and send weekly report
        if: github.event_name == 'workflow_dispatch' || steps.rome_time.outputs.should_run == 'true'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          ELSEVIER_API_KEY: ${{ secrets.ELSEVIER_API_KEY }}
          EASYSCHOLAR_SECRET_KEY: ${{ secrets.EASYSCHOLAR_SECRET_KEY }}
        run: python src/main.py

      - name: Commit updated reports and seen file
        if: github.event_name == 'workflow_dispatch' || steps.rome_time.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seen.json reports/
          git diff --cached --quiet || git commit -m "Update weekly literature report"
          git push
